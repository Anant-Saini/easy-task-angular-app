<app-header />
<main>
  <ul id="users">
    @for (user of users; track user.id) {
      <li>
        <app-user [user]="user" [selected]="user.id === selectedUser?.id" (selectUser)="onSelectedUser($event)"></app-user>
      </li>
    }
  </ul>
  @if (selectedUser) {
    <app-tasks [selectedUser]="selectedUser"></app-tasks>
  } @else {
    <p id="fallback">Please select a user!</p>
  }
</main>
